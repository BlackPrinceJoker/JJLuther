<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Luther</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            /* Removed align-items: center so it scrolls normally when stacked */
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px; /* Adds space at the top and bottom of the page */
        }

        .image-gallery {
            display: flex;
            flex-direction: column; /* This forces the vertical stacking */
            align-items: center;    /* Keeps them centered in the column */
            gap: 40px; 
            width: 100%;
            max-width: 800px;       /* Limits how wide they get on desktop */
        }

        .image-card {
            width: 100%;            /* Fills the 800px gallery container */
            aspect-ratio: 16 / 9; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
            display: flex; 
        }

        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
            transition: transform 0.5s ease;
        }

        .image-card:hover img {
            transform: scale(1.05); 
        }
    </style>
</head>
<body>

    <div class="image-gallery">
        <div class="image-card">
            <img src="PictureA.jpg" loading="lazy" decoding="async" alt="Baptist Catechism">
        </div>
        <div class="image-card">
            <img src="PictureB.jpg" loading="lazy" decoding="async" alt="Heidelberg Catechism">
        </div>
    </div>

</body>
</html>
