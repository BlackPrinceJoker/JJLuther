<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Luther</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .image-gallery {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            gap: 40px; 
            width: 100%;
            max-width: 800px;       
        }

        .image-card {
            width: 100%;            
            /* Removed the forced 16/9 aspect ratio */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
            display: block; /* Changed from flex to block so height adjusts naturally */
        }

        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .image-card img {
            width: 100%;
            height: auto; /* Allows the image to dictate its own height without clipping */
            display: block;
            transition: transform 0.5s ease;
        }

        .image-card:hover img {
            transform: scale(1.03); /* Reduced zoom slightly so it doesn't feel overwhelming on larger images */
        }
    </style>
</head>
<body>

    <div class="image-gallery">
        <div class="image-card">
            <img src="PictureA.jpg" loading="lazy" decoding="async" alt="Baptist Catechism">
        </div>
        <div class="image-card">
            <img src="PictureB.jpg" loading="lazy" decoding="async" alt="Heidelberg Catechism">
        </div>
    </div>

</body>
</html>
