<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Luther</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5; /* Slightly softer background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .image-gallery {
            display: flex;
            gap: 40px; /* Increased gap for better breathing room */
            padding: 20px;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .image-card {
            flex: 1;
            min-width: 350px;
            aspect-ratio: 16 / 9; /* Forces both cards to be perfectly identical widescreen rectangles */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); /* Softer, wider shadow */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
            display: flex; 
        }

        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* The magic fix: forces the image to stretch and fill the space completely */
            display: block;
            transition: transform 0.5s ease;
        }

        .image-card:hover img {
            transform: scale(1.05); /* Slightly smoother zoom */
        }
    </style>
</head>
<body>

    <div class="image-gallery">
        <div class="image-card">
            <img src="PictureA.png" alt="Baptist Catechism">
        </div>
        <div class="image-card">
            <img src="PictureB.png" alt="Heidelberg Catechism">
        </div>
    </div>

</body>
</html>
