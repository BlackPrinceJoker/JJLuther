<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Image Display</title>
    <style>
        /* Base page styling */
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Container for the images */
        .image-gallery {
            display: flex;
            gap: 30px; /* Space between the images */
            padding: 20px;
            max-width: 1000px;
            width: 100%;
            flex-wrap: wrap; /* Allows stacking on smaller screens */
            justify-content: center;
        }

        /* Individual image card styling */
        .image-card {
            flex: 1;
            min-width: 300px; /* Ensures they don't get too small before stacking */
            border-radius: 12px;
            overflow: hidden; /* Keeps the rounded corners when the image zooms */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
        }

        /* Hover effect for the card */
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* The actual image */
        .image-card img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        /* Slight zoom on the image when hovering over the card */
        .image-card:hover img {
            transform: scale(1.03);
        }

    </style>
</head>
<body>

    <div class="image-gallery">
        <div class="image-card">
            <img src="PictureA.png" alt="Description of Picture A">
        </div>

        <div class="image-card">
            <img src="PictureB.png" alt="Description of Picture B">
        </div>
    </div>

</body>
</html>
